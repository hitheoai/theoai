name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Test SDK
        run: npm run test --workspace=packages/sdk

      - name: Test MCP
        run: npm run test --workspace=packages/mcp
